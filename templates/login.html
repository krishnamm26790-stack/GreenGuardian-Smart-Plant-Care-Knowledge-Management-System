{% extends "base.html" %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <h1 class="text-center text-success mb-4">
        🔐 Login
    </h1>

    {% if error %}

    <div class="alert alert-danger">

        {{ error }}

    </div>

    {% endif %}

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                class="form-control"
                name="username"
                placeholder="Enter Username"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                class="form-control"
                name="password"
                placeholder="Enter Password"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success w-100">

            Login

        </button>

    </form>

    <div class="text-center mt-3">

        Don't have an account?

        <a href="/register">

            Register

        </a>

    </div>

</div>

{% endblock %}
