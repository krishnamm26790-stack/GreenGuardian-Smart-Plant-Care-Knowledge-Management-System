{% extends "base.html" %}

{% block title %}
Record Watering
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:700px;">

    <h1 class="text-primary mb-4">
        💧 Record Watering
    </h1>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">

                Select Plant

            </label>

            <select
                name="plant_id"
                class="form-control"
                required>

                {% for plant in plants %}

                <option value="{{ plant[0] }}">

                    {{ plant[1] }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Notes

            </label>

            <textarea
                name="notes"
                class="form-control"
                rows="4"
                placeholder="Optional notes..."></textarea>

        </div>

        <button
            class="btn btn-primary">

            💧 Save Record

        </button>

        <a
            href="/watering"
            class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
