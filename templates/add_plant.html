{% extends "base.html" %}

{% block title %}
Add Plant
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:650px;">

    <h1 class="text-success mb-4">
        🌱 Add New Plant
    </h1>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Plant Name</label>
            <input
                type="text"
                name="plant_name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Plant Type</label>
            <input
                type="text"
                name="plant_type"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Location</label>
            <input
                type="text"
                name="location"
                class="form-control"
                required>
        </div>

        <div class="mb-4">
            <label class="form-label">Water Every (Days)</label>
            <input
                type="number"
                name="watering_frequency"
                class="form-control"
                required>
        </div>

        <button class="btn btn-success">
            🌱 Add Plant
        </button>

        <a href="{{ url_for('plants') }}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
