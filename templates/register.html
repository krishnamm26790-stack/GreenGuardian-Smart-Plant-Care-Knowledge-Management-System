{% extends "base.html" %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <h1 class="text-center text-success mb-4">
        📝 Register
    </h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="alert alert-danger">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter Username"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success w-100">

            Register

        </button>

    </form>

    <div class="text-center mt-3">

        Already have an account?

        <a href="{{ url_for('login') }}">

            Login

        </a>

    </div>

</div>

{% endblock %}
