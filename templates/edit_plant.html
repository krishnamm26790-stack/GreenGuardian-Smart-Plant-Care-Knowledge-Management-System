{% extends "base.html" %}

{% block title %}
Edit Plant
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:700px;">

    <h1 class="text-success mb-4">
        ✏ Edit Plant
    </h1>

    <form method="POST">

        <div class="mb-3">

            <label>Plant Name</label>

            <input
                type="text"
                class="form-control"
                name="plant_name"
                value="{{ plant[1] }}"
                required>

        </div>

        <div class="mb-3">

            <label>Plant Type</label>

            <input
                type="text"
                class="form-control"
                name="plant_type"
                value="{{ plant[2] }}"
                required>

        </div>

        <div class="mb-3">

            <label>Location</label>

            <input
                type="text"
                class="form-control"
                name="location"
                value="{{ plant[3] }}"
                required>

        </div>

        <div class="mb-3">

            <label>Water Every (Days)</label>

            <input
                type="number"
                class="form-control"
                name="watering_frequency"
                value="{{ plant[4] }}"
                required>

        </div>

        <button class="btn btn-warning">
            ✏ Update Plant
        </button>

        <a href="/plants" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
