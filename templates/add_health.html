{% extends "base.html" %}

{% block title %}
Add Health Record
{% endblock %}

{% block content %}

<div class="container mt-5" style="max-width:700px;">

    <h1 class="text-danger mb-4">

        ❤️ Add Health Record

    </h1>

    <form method="POST">

        <div class="mb-3">

            <label>Select Plant</label>

            <select
                name="plant_id"
                class="form-select"
                required>

                {% for plant in plants %}

                <option value="{{ plant[0] }}">

                    {{ plant[1] }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label>Status</label>

            <select
                name="status"
                class="form-select">

                <option>Healthy</option>
                <option>Needs Attention</option>
                <option>Diseased</option>

            </select>

        </div>

        <div class="mb-3">

            <label>Notes</label>

            <textarea
                name="notes"
                rows="4"
                class="form-control"></textarea>

        </div>

        <button class="btn btn-danger">

            ❤️ Save Record

        </button>

        <a href="/health" class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
